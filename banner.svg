<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <linearGradient id="text" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1000" height="300" fill="url(#bg)" rx="20"/>

  <!-- Decorative circles -->
  <circle cx="850" cy="70" r="90" fill="#38BDF8" opacity="0.08"/>
  <circle cx="930" cy="220" r="120" fill="#8B5CF6" opacity="0.08"/>

  <!-- Left Accent -->
  <rect x="60" y="50" width="6" height="200" fill="url(#line)" rx="5"/>

  <!-- Main Name -->
  <text x="100" y="120"
        font-family="Segoe UI"
        font-size="52"
        font-weight="700"
        fill="url(#text)">
      VINITH R
  </text>

  <!-- Role -->
  <text x="100" y="165"
        font-family="Segoe UI"
        font-size="22"
        fill="#CBD5E1">
      AI & Data Science Student
  </text>

  <!-- Description -->
  <text x="100" y="205"
        font-family="Segoe UI"
        font-size="18"
        fill="#94A3B8">
      Building AI Applications • Machine Learning • FastAPI
  </text>

  <!-- Skills -->
  <rect x="100" y="235" width="110" height="30" rx="15" fill="#1E293B"/>
  <text x="125" y="255" fill="#38BDF8" font-size="14">Python</text>

  <rect x="225" y="235" width="150" height="30" rx="15" fill="#1E293B"/>
  <text x="245" y="255" fill="#8B5CF6" font-size="14">Machine Learning</text>

  <rect x="390" y="235" width="120" height="30" rx="15" fill="#1E293B"/>
  <text x="420" y="255" fill="#22C55E" font-size="14">FastAPI</text>

  <rect x="525" y="235" width="130" height="30" rx="15" fill="#1E293B"/>
  <text x="550" y="255" fill="#F59E0B" font-size="14">Deep Learning</text>

  <!-- Right Side -->
  <text x="760" y="140"
        text-anchor="middle"
        font-family="Segoe UI"
        font-size="70"
        font-weight="700"
        fill="#38BDF8"
        opacity="0.15">
      AI
  </text>

  <text x="760" y="190"
        text-anchor="middle"
        font-family="Segoe UI"
        font-size="18"
        fill="#94A3B8">
      Learning • Building • Innovating
  </text>

</svg>
