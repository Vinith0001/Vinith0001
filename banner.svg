<svg width="1000" height="300" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg">

  <defs>

    <!-- Background Gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <!-- Animated Name Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8">
        <animate attributeName="stop-color"
                 values="#38BDF8;#8B5CF6;#38BDF8"
                 dur="5s"
                 repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#8B5CF6">
        <animate attributeName="stop-color"
                 values="#8B5CF6;#38BDF8;#8B5CF6"
                 dur="5s"
                 repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <!-- Accent Gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1000" height="300" rx="20" fill="url(#bg)"/>

  <!-- Decorative Glow Circles -->
  <circle cx="850" cy="70" r="90" fill="#38BDF8" opacity="0.08"/>
  <circle cx="930" cy="220" r="120" fill="#8B5CF6" opacity="0.08"/>

  <!-- Floating Particles -->
  <circle cx="870" cy="80" r="3" fill="#38BDF8">
    <animate attributeName="cy"
             values="80;60;80"
             dur="5s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="920" cy="220" r="3" fill="#8B5CF6">
    <animate attributeName="cy"
             values="220;200;220"
             dur="6s"
             repeatCount="indefinite"/>
  </circle>

  <circle cx="780" cy="230" r="2" fill="#22C55E">
    <animate attributeName="cy"
             values="230;210;230"
             dur="4s"
             repeatCount="indefinite"/>
  </circle>

  <!-- Left Accent Bar -->
  <rect x="60"
        y="50"
        width="6"
        height="200"
        rx="5"
        fill="url(#accent)"/>

  <!-- Name -->
  <text x="100"
        y="115"
        font-family="Segoe UI, Arial"
        font-size="56"
        font-weight="700"
        fill="url(#textGrad)">
    VINITH R
  </text>

  <!-- Role -->
  <text x="100"
        y="160"
        font-family="Segoe UI, Arial"
        font-size="22"
        fill="#CBD5E1">
    AI &amp; DATA SCIENCE STUDENT
  </text>

  <!-- Description -->
  <text x="100"
        y="200"
        font-family="Segoe UI, Arial"
        font-size="18"
        fill="#94A3B8">
    Building Intelligent Applications • Machine Learning • FastAPI
  </text>

  <!-- Skill Pills -->

  <rect x="100" y="230" width="95" height="34" rx="17"
        fill="#1E293B" stroke="#38BDF8" stroke-opacity="0.3"/>
  <text x="125" y="252"
        fill="#38BDF8"
        font-size="14"
        font-family="Segoe UI">
    Python
  </text>

  <rect x="210" y="230" width="155" height="34" rx="17"
        fill="#1E293B" stroke="#8B5CF6" stroke-opacity="0.3"/>
  <text x="235" y="252"
        fill="#8B5CF6"
        font-size="14"
        font-family="Segoe UI">
    Machine Learning
  </text>

  <rect x="380" y="230" width="105" height="34" rx="17"
        fill="#1E293B" stroke="#22C55E" stroke-opacity="0.3"/>
  <text x="405" y="252"
        fill="#22C55E"
        font-size="14"
        font-family="Segoe UI">
    FastAPI
  </text>

  <rect x="500" y="230" width="115" height="34" rx="17"
        fill="#1E293B" stroke="#F59E0B" stroke-opacity="0.3"/>
  <text x="525" y="252"
        fill="#F59E0B"
        font-size="14"
        font-family="Segoe UI">
    PostgreSQL
  </text>

  <rect x="630" y="230" width="125" height="34" rx="17"
        fill="#1E293B" stroke="#38BDF8" stroke-opacity="0.3"/>
  <text x="655" y="252"
        fill="#38BDF8"
        font-size="14"
        font-family="Segoe UI">
    Deep Learning
  </text>

  <!-- AI Orb -->
  <g filter="url(#glow)">

    <circle cx="820"
            cy="140"
            r="55"
            fill="none"
            stroke="#38BDF8"
            stroke-width="2"
            opacity="0.5">

      <animate attributeName="r"
               values="55;65;55"
               dur="4s"
               repeatCount="indefinite"/>

      <animate attributeName="opacity"
               values="0.5;0.8;0.5"
               dur="4s"
               repeatCount="indefinite"/>

    </circle>

    <circle cx="820"
            cy="140"
            r="35"
            fill="#38BDF8"
            opacity="0.08"/>

    <text x="820"
          y="152"
          text-anchor="middle"
          font-family="Segoe UI"
          font-size="42"
          font-weight="700"
          fill="#38BDF8">
      AI
    </text>

  </g>

  <!-- Footer -->
  <text x="820"
        y="215"
        text-anchor="middle"
        font-family="Segoe UI"
        font-size="16"
        fill="#94A3B8">
    Learn • Build • Deploy
  </text>

</svg>
